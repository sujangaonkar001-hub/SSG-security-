name: Build Kivy Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            openjdk-17-jdk \
            zip \
            unzip \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libffi-dev \
            zlib1g-dev \
            libssl-dev \
            make
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --user buildozer cython kivy

      - name: Add pip user bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          cd "$GITHUB_WORKSPACE"
          buildozer android debug --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssg_security-apk
          path: bin/*.apk
